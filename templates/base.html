<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Smart Traffic Violation Detection{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Orbitron:wght@500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark premium-navbar">
    <div class="container navbar-shell">
        <a class="navbar-brand d-flex align-items-center gap-3" href="/">
            <img src="{{ url_for('static', filename='images/logo.png') }}"
                 alt="Traffic Violation AI Logo"
                 class="navbar-logo">
            <div class="brand-copy d-none d-md-block">
                <span class="brand-kicker">TrafficVision AI</span>
                <strong class="brand-title">Smart Enforcement Suite</strong>
            </div>
        </a>

        <div class="navbar-nav ms-auto premium-nav-links">
            <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Home</a>
            <a class="nav-link {% if request.path.startswith('/upload') %}active{% endif %}" href="/upload">Upload Video</a>
            <a class="nav-link {% if request.path.startswith('/history') or request.path.startswith('/violations') %}active{% endif %}" href="/history">History</a>
            <a class="nav-link {% if request.path.startswith('/penalty') %}active{% endif %}" href="/penalty">E-Challan</a>
        </div>
    </div>
</nav>

<div class="container my-5">
    {% block content %}{% endblock %}
</div>

<footer class="text-center text-muted py-3 border-top">
    <small>Smart Traffic Violation Detection System · Final Year Capstone</small>
</footer>

</body>
</html>
